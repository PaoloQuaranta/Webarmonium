<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webarmonium Composition Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
          integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4"
          crossorigin="anonymous"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"
          integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO"
          crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-green: #3fb950;
      --accent-yellow: #d29922;
      --accent-red: #f85149;
      --border: #30363d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-red);
    }

    .status-dot.connected {
      background: var(--accent-green);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .param-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .param {
      background: var(--bg-tertiary);
      padding: 10px;
      border-radius: 6px;
    }

    .param-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .param-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .param-value {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
    }

    .param-value.small {
      font-size: 1rem;
    }

    .progress-bar {
      height: 6px;
      background: var(--bg-primary);
      border-radius: 3px;
      margin-top: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Inline mini-chart under each parameter */
    .inline-chart {
      height: 30px;
      margin-top: 4px;
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .inline-chart canvas {
      width: 100% !important;
      height: 30px !important;
      display: block;
    }

    .genre-bars {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .genre-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .genre-name {
      width: 80px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .genre-bar {
      flex: 1;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      overflow: hidden;
    }

    .genre-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .genre-value {
      width: 40px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: right;
    }

    .event-log {
      max-height: 300px;
      overflow-y: auto;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.75rem;
      background: var(--bg-tertiary);
      border-radius: 6px;
      padding: 12px;
    }

    .event-entry {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .event-entry:last-child {
      border-bottom: none;
    }

    .event-time {
      color: var(--text-secondary);
    }

    .event-type {
      color: var(--accent);
      margin: 0 8px;
    }

    .event-data {
      color: var(--text-primary);
    }

    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .stat-value {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--accent-green);
    }

    .wide {
      grid-column: span 2;
    }

    @media (max-width: 768px) {
      .wide {
        grid-column: span 1;
      }
      .param-grid {
        grid-template-columns: 1fr;
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .error {
      color: var(--accent-red);
      text-align: center;
      padding: 20px;
    }

    /* Stats button in header */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-stats {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-stats:hover {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .btn-stats svg {
      width: 16px;
      height: 16px;
    }

    /* Reports Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 900px;
      margin: 20px auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .report-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .report-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .report-item:hover {
      background: var(--bg-primary);
    }

    .report-item.active {
      border: 1px solid var(--accent);
    }

    .report-date {
      font-weight: 600;
      color: var(--accent);
    }

    .report-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .tab {
      padding: 8px 16px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      font-size: 0.875rem;
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .aggregate-section {
      margin-bottom: 20px;
    }

    .aggregate-section h3 {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .distribution-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
    }

    .distribution-item {
      background: var(--bg-tertiary);
      padding: 8px 12px;
      border-radius: 6px;
      text-align: center;
    }

    .distribution-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .distribution-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric-card {
      background: var(--bg-tertiary);
      padding: 12px;
      border-radius: 6px;
    }

    .metric-card h4 {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .metric-values {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 0.75rem;
    }

    .metric-values span {
      text-align: center;
    }

    .timeline-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    .timeline-table th,
    .timeline-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .timeline-table th {
      color: var(--text-secondary);
      font-weight: 500;
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
    }

    .timeline-table td {
      color: var(--text-primary);
    }

    .timeline-wrapper {
      max-height: 400px;
      overflow-y: auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .back-btn:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    /* Entry #210: Genre Override Control Styles */
    .genre-btn {
      padding: 8px 4px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .genre-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .genre-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }

    .genre-btn.forced {
      background: var(--accent-yellow);
      color: var(--bg-primary);
      border-color: var(--accent-yellow);
    }

    .btn-clear {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--accent-red);
      border-radius: 6px;
      color: var(--accent-red);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-clear:hover {
      background: var(--accent-red);
      color: var(--bg-primary);
    }

    .btn-clear:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-clear:disabled:hover {
      background: transparent;
      color: var(--accent-red);
    }

    .override-select {
      width: 100%;
      padding: 8px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.875rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Webarmonium Composition Monitor</h1>
    <div class="header-actions">
      <button onclick="openReportsModal()" class="btn-stats" title="View Composition Reports">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        Reports
      </button>
      <a href="/stats" target="_blank" class="btn-stats" title="View Traffic Statistics">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>
        </svg>
        Traffic Stats
      </a>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
      </div>
    </div>
  </div>

  <div id="app">
    <div class="loading">Loading monitor data...</div>
  </div>

  <!-- Reports Modal -->
  <div class="modal-overlay" id="reportsModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Composition Reports</h2>
        <button class="modal-close" onclick="closeReportsModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="loading">Loading reports...</div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const API_KEY = new URLSearchParams(window.location.search).get('apiKey') || '';

    // State
    let socket = null;
    let events = [];
    const MAX_EVENTS = 50;

    // Per-room filtering state
    let selectedRoomId = 'all';
    const latestSnapshotByRoom = new Map();
    let latestEventCounts = {};

    // Chart update throttling with requestAnimationFrame
    let pendingHistoryUpdate = null;
    let lastHistoryData = null;

    // Mini charts for 5-minute history (inline under each param)
    const historyCharts = {};
    const HISTORY_FIELDS = {
      'core.tempo': { color: '#58a6ff', min: 30, max: 300 },
      'core.complexityLevel': { color: '#3fb950', min: 0, max: 1, scale: 100 },
      'core.density': { color: '#d29922', min: 0, max: 1, scale: 100 },
      'core.tensionLevel': { color: '#f85149', min: 0, max: 1, scale: 100 },
      'core.compositionCount': { color: '#a371f7', min: 0 },
      'style.energy': { color: '#f778ba', min: 0, max: 1, scale: 100 },
      'style.harmonicComplexity.chromaticism': { color: '#79c0ff', min: 0, max: 1, scale: 100 },
      'style.harmonicComplexity.dissonance': { color: '#ffa657', min: 0, max: 1, scale: 100 },
      'materials.total': { color: '#d2a8ff', min: 0 },
      'room.gestureCount': { color: '#ffc658', min: 0 }
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      connectWebSocket();
      loadInitialData();
    });

    function connectWebSocket() {
      const wsUrl = window.location.origin;
      socket = io('/monitor', {
        query: { apiKey: API_KEY },
        transports: ['websocket']
      });

      socket.on('connect', () => {
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('statusText').textContent = 'Connected';
      });

      socket.on('disconnect', () => {
        document.getElementById('statusDot').classList.remove('connected');
        document.getElementById('statusText').textContent = 'Disconnected';
      });

      socket.on('connect_error', (err) => {
        document.getElementById('statusText').textContent = 'Connection Error';
        console.error('WebSocket error:', err);
      });

      socket.on('monitor:init', (data) => {
        renderDashboard(data);
        setTimeout(() => {
          initGenreOverrideControls();  // Entry #210
          initHistoryCharts();
          if (data.numericHistory) {
            updateHistoryCharts(data.numericHistory);
          }
          // Populate room selector from known active rooms
          if (data.activeRoomIds) {
            data.activeRoomIds.forEach(id => ensureRoomInSelector(id));
          }
        }, 100);
      });

      socket.on('monitor:snapshot', (event) => {
        const snapshotRoomId = event.roomId || event.data?.roomId;

        // Always log all events
        addEvent('SNAPSHOT', formatSnapshot(event.data));

        // Cache latest snapshot per room
        if (snapshotRoomId) {
          latestSnapshotByRoom.set(snapshotRoomId, event.data);
          latestEventCounts = event.eventCounts || latestEventCounts;
          ensureRoomInSelector(snapshotRoomId);
        }

        // Only update dashboard if this room matches the filter
        if (selectedRoomId === 'all' || selectedRoomId === snapshotRoomId) {
          updateFromSnapshot(event.data, event.eventCounts);
        }
      });

      // History updates are sent separately (throttled every 5 seconds)
      socket.on('monitor:history_update', (event) => {
        if (event.numericHistory) {
          lastHistoryData = event.numericHistory;
          if (!pendingHistoryUpdate) {
            pendingHistoryUpdate = requestAnimationFrame(() => {
              updateHistoryCharts(lastHistoryData);
              pendingHistoryUpdate = null;
            });
          }
        }
      });

      socket.on('monitor:key_change', (data) => {
        addEvent('KEY', `${data.from} -> ${data.to}`);
      });

      socket.on('monitor:mode_change', (data) => {
        addEvent('MODE', `${data.from} -> ${data.to}`);
      });

      socket.on('monitor:form_change', (data) => {
        addEvent('FORM', `${data.from} -> ${data.to}`);
      });

      socket.on('monitor:style_shift', (data) => {
        addEvent('STYLE', `${data.from} -> ${data.to}`);
      });

      // Entry #210: Genre Override Control socket handlers
      socket.on('monitor:override-status', (data) => {
        if (data.success) {
          updateOverrideUI(data.roomId, data.override);
        } else {
          console.error('Override error:', data.error);
          addEvent('ERROR', data.error);
        }
      });

      socket.on('monitor:genre-override-changed', (data) => {
        updateOverrideUI(data.roomId, data.override);
        if (data.override?.enabled) {
          addEvent('OVERRIDE', `Manual: ${data.override.genre}`);
        } else {
          addEvent('OVERRIDE', 'Returned to automatic');
        }
      });

      socket.on('monitor:all-override-states', (data) => {
        if (data.states) {
          // Ensure all rooms from override states are in the selector
          for (const roomId of Object.keys(data.states)) {
            ensureRoomInSelector(roomId);
          }

          // Update override UI for the currently selected room
          const select = document.getElementById('targetRoom');
          if (select) {
            const currentRoom = select.value === 'all' ? 'landing-room' : select.value;
            updateOverrideUI(currentRoom, data.states[currentRoom]);
          }
        }
      });

      // Request initial override states
      setTimeout(() => {
        socket.emit('monitor:get-override-states');
      }, 500);
    }

    // Entry #210: Genre Override Control functions
    let currentOverride = { enabled: false, genre: null, roomId: 'landing-room' };

    function getOverrideTargetRoom() {
      const val = document.getElementById('targetRoom')?.value || 'landing-room';
      // 'all' is not a valid target for override - default to landing-room
      return val === 'all' ? 'landing-room' : val;
    }

    function initGenreOverrideControls() {
      // Genre button click handlers
      document.querySelectorAll('.genre-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const genre = btn.dataset.genre;
          setGenreOverride(getOverrideTargetRoom(), genre);
        });
      });

      // Clear override button
      const clearBtn = document.getElementById('clearOverride');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          clearGenreOverride(getOverrideTargetRoom());
        });
      }

      // Room selector change handler (controls both data display and genre override)
      const roomSelect = document.getElementById('targetRoom');
      if (roomSelect) {
        // Restore selected value after re-render
        roomSelect.value = selectedRoomId;

        roomSelect.addEventListener('change', () => {
          selectedRoomId = roomSelect.value;

          // Update label
          const label = document.getElementById('roomSourceLabel');
          if (label) {
            const opt = roomSelect.options[roomSelect.selectedIndex];
            label.textContent = `Viewing: ${opt?.textContent || selectedRoomId}`;
          }

          // Request override states for the new room
          if (socket) {
            socket.emit('monitor:get-override-states');
          }

          // Immediately display cached snapshot for this room
          if (selectedRoomId !== 'all') {
            const cached = latestSnapshotByRoom.get(selectedRoomId);
            if (cached) {
              updateFromSnapshot(cached, latestEventCounts);
            }
          }

          // Re-filter history charts
          if (lastHistoryData) {
            updateHistoryCharts(lastHistoryData);
          }
        });
      }
    }

    function setGenreOverride(roomId, genre) {
      if (socket) {
        socket.emit('monitor:set-genre', { roomId, genre });
      }
    }

    function clearGenreOverride(roomId) {
      if (socket) {
        socket.emit('monitor:clear-override', { roomId });
      }
    }

    function updateOverrideUI(roomId, override) {
      const modeEl = document.getElementById('overrideMode');
      const infoEl = document.getElementById('overrideInfo');
      const clearBtn = document.getElementById('clearOverride');

      if (!modeEl || !infoEl || !clearBtn) return;

      if (override?.enabled) {
        modeEl.textContent = 'MANUAL';
        modeEl.style.color = 'var(--accent-yellow)';
        infoEl.innerHTML = `
          Forcing genre: <strong>${override.genre}</strong><br>
          Set at: ${new Date(override.setAt).toLocaleTimeString()}
        `;
        clearBtn.disabled = false;

        // Highlight active genre button
        document.querySelectorAll('.genre-btn').forEach(btn => {
          btn.classList.remove('active', 'forced');

      // Check if option already exists

        if (opt.value === roomId) return;
      }
      const option = document.createElement('option');
      option.value = roomId;
      option.textContent = roomId === 'landing-room'

        : `Room: ${roomId.slice(0, 8)}...`;
      select.appendChild(option);

          renderDashboard(data);
          setTimeout(() => {
            initGenreOverrideControls();  // Entry #210
            initHistoryCharts();
            if (data.numericHistory) {
              updateHistoryCharts(data.numericHistory);

            if (data.activeRoomIds) {
              data.activeRoomIds.forEach(id => ensureRoomInSelector(id));

          }, 100);

    function renderGenreBars(weights) {
      const genres = ['ambient', 'rhythmic', 'melodic', 'experimental', 'jazz', 'classical', 'electronic', 'rock'];
      return genres.map(genre => `
        <div class="genre-row">
          <span class="genre-name">${genre}</span>
          <div class="genre-bar">
            <div class="genre-fill" style="width: ${((weights[genre] || 0) * 100)}%"></div>
          </div>
          <span class="genre-value">${((weights[genre] || 0) * 100).toFixed(0)}%</span>
        </div>
      `).join('');
    }

    function getDominantGenre(weights) {
      if (!weights || Object.keys(weights).length === 0) return '-';
      let maxGenre = '-';
      let maxWeight = 0;
      for (const [genre, weight] of Object.entries(weights)) {
        if (weight > maxWeight) {
          maxWeight = weight;
          maxGenre = genre;
        }
      }
      return maxGenre;
    }

    function renderEvent(event) {
      return `
        <div class="event-entry">
          <span class="event-time">${event.time}</span>
          <span class="event-type">[${event.type}]</span>
          <span class="event-data">${event.data}</span>
        </div>
      `;
    }

    function updateFromSnapshot(snapshot, eventCounts) {
      const core = snapshot.core || {};
      const style = snapshot.style || {};
      const harmony = snapshot.harmony || {};
      const rhythmic = style.rhythmicCharacter || {};
      const harmonic = style.harmonicComplexity || {};
      const genreWeights = style.genreWeights || {};
      const room = snapshot.room || {};
      const materials = snapshot.materials || {};
      const counts = eventCounts || {};

      // Update core params
      updateElement('keyCenter', core.keyCenter || 'C');
      updateElement('mode', core.mode || 'ionian');
      updateElement('tempo', `${core.tempo || 120} BPM`);
      updateElement('form', core.formStructure || 'ABA');
      updateElement('section', core.currentSection || 'A');
      updateElement('compCount', core.compositionCount || 0);

      // Update intensity
      updateProgress('energy', style.energy || 0.5);
      updateProgress('complexity', core.complexityLevel || 0.5);
      updateProgress('density', core.density || 0.5);
      updateProgress('tension', core.tensionLevel || 0.5);

      // Update harmonic
      updateElement('chromaticism', `${((harmonic.chromaticism || 0) * 100).toFixed(0)}%`);
      updateElement('dissonance', `${((harmonic.dissonance || 0) * 100).toFixed(0)}%`);
      updateElement('modalFlavor', harmonic.modalFlavor || 'major');
      updateElement('currentChord', harmony.currentChord || '-');

      // Update rhythmic
      updateElement('swing', `${((rhythmic.swing || 0) * 100).toFixed(0)}%`);
      updateElement('syncopation', `${((rhythmic.syncopation || 0) * 100).toFixed(0)}%`);
      updateElement('regularity', `${((rhythmic.regularity || 0.5) * 100).toFixed(0)}%`);
      updateElement('timeSig', style.timeSignature || '4/4');

      // Update genre bars and current style
      const genreBarsEl = document.getElementById('genreWeights');
      if (genreBarsEl) {
        genreBarsEl.innerHTML = renderGenreBars(genreWeights);
      }
      // Entry #182: Update current genre vs metric-calculated genre
      updateElement('currentGenre', style.currentGenre || style.forcedGenre || '-');
      updateElement('metricGenre', style.metricGenre || getDominantGenre(genreWeights));

      // Update stats
      updateElement('statCompositions', counts.compositions || 0);
      updateElement('statKeyChanges', counts.keyChanges || 0);
      updateElement('statModeChanges', counts.modeChanges || 0);
      updateElement('statFormChanges', counts.formChanges || 0);
      updateElement('statStyleShifts', counts.styleShifts || 0);
      updateElement('statGestures', room.gestureCount || 0);
      updateElement('statMaterials', materials.total || 0);
    }

    function updateElement(id, value) {
      const el = document.getElementById(id);
      if (el) {
        el.textContent = String(value);
      }
    }

    function updateProgress(id, value) {
      const valEl = document.getElementById(id);
      const barEl = document.getElementById(id + 'Bar');
      if (valEl) valEl.textContent = `${(value * 100).toFixed(0)}%`;
      if (barEl) barEl.style.width = `${value * 100}%`;
    }

    function addEvent(type, data) {
      const now = new Date();
      const time = now.toTimeString().slice(0, 8);

      events.unshift({ time, type, data });
      if (events.length > MAX_EVENTS) {
        events.pop();
      }

      const logEl = document.getElementById('eventLog');
      if (logEl) {
        logEl.innerHTML = events.map(e => renderEvent(e)).join('');
      }
    }

    function formatSnapshot(snapshot) {
      const core = snapshot.core || {};
      const source = snapshot.source || 'room';
      const roomId = snapshot.roomId || '-';
      const sourceLabel = source === 'landing' ? '🏠 LANDING' : `🚪 ${roomId.slice(0, 8)}`;
      return `[${sourceLabel}] ${core.keyCenter || 'C'} ${core.mode || 'ionian'} | ${core.formStructure || 'ABA'} [${core.currentSection || 'A'}] | ${core.tempo || 120} BPM`;
    }

    function initHistoryCharts() {
      if (typeof Chart === 'undefined') {
        console.error('Chart.js not loaded');
        return;
      }

      try {
        // Destroy existing charts
        Object.values(historyCharts).forEach(chart => chart?.destroy());

        // Create inline chart for each field
        for (const [field, config] of Object.entries(HISTORY_FIELDS)) {
          const canvasId = `chart-${field.replace(/\./g, '-')}`;
          const canvas = document.getElementById(canvasId);
          if (!canvas) continue;

          const ctx = canvas.getContext('2d');
          historyCharts[field] = new Chart(ctx, {
            type: 'line',
            data: {
              labels: [],
              datasets: [{
                data: [],
                borderColor: config.color,
                backgroundColor: config.color + '15',
                borderWidth: 1.5,
                fill: true,
                tension: 0.4,
                pointRadius: 0
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              layout: { padding: 0 },
              plugins: {
                legend: { display: false },
                tooltip: { enabled: false }
              },
              scales: {
                x: { display: false },
                y: {
                  display: false,
                  min: config.min,
                  max: config.max !== undefined ? (config.scale ? config.max * config.scale : config.max) : undefined
                }
              },
              elements: {
                line: { borderWidth: 1 }
              }
            }
          });
        }
      } catch (error) {
        console.error('Failed to initialize charts:', error);
      }
    }

    function updateHistoryCharts(numericHistory) {
      if (!numericHistory) return;

      for (const [field, config] of Object.entries(HISTORY_FIELDS)) {
        const chart = historyCharts[field];
        const data = numericHistory[field];

        if (!chart || !data || data.length === 0) continue;

        // Data format: [[relativeSeconds, value, roomId], ...]
        // Filter by selected room
        const filtered = selectedRoomId === 'all'
          ? data
          : data.filter(entry => entry[2] === selectedRoomId);

        if (filtered.length === 0) {
          chart.data.labels = [];
          chart.data.datasets[0].data = [];
          chart.update('none');
          continue;
        }

        const sorted = [...filtered].sort((a, b) => b[0] - a[0]);

        const scaledData = sorted.map(([time, val]) => ({
          x: time,
          y: config.scale ? val * config.scale : val
        }));

        chart.data.labels = scaledData.map(d => d.x);
        chart.data.datasets[0].data = scaledData.map(d => d.y);
        chart.update('none');
      }
    }

    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="error">${message}</div>
      `;
    }

    // ====== Reports Modal Functions ======

    let currentReportData = null;

    function openReportsModal() {
      document.getElementById('reportsModal').classList.add('active');
      loadReportsList();
    }

    function closeReportsModal() {
      document.getElementById('reportsModal').classList.remove('active');
      currentReportData = null;
    }

    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeReportsModal();
    });

    // Close modal on overlay click
    document.getElementById('reportsModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) closeReportsModal();
    });

    async function loadReportsList() {
      const modalBody = document.getElementById('modalBody');
      const modalTitle = document.getElementById('modalTitle');
      modalTitle.textContent = 'Composition Reports';
      modalBody.innerHTML = '<div class="loading">Loading reports...</div>';

      try {
        const headers = { 'X-Admin-Key': API_KEY };
        const response = await fetch('/api/admin/monitor/reports', { headers });
        const data = await response.json();

        if (!data.success) {
          modalBody.innerHTML = `<div class="error">${data.message || 'Failed to load reports'}</div>`;
          return;
        }

        if (!data.reports || data.reports.length === 0) {
          modalBody.innerHTML = '<div class="no-data">No reports available yet</div>';
          return;
        }

        modalBody.innerHTML = `
          <div class="report-list">
            ${data.reports.map(r => `
              <div class="report-item" onclick="loadReport('${r.date}')">
                <div>
                  <span class="report-date">${r.date}</span>
                </div>
                <div class="report-meta">
                  ${r.entries} entries | ${r.sizeFormatted}
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        modalBody.innerHTML = `<div class="error">Failed to load reports: ${err.message}</div>`;
      }
    }

    async function loadReport(date) {
      const modalBody = document.getElementById('modalBody');
      const modalTitle = document.getElementById('modalTitle');
      modalTitle.textContent = `Report: ${date}`;
      modalBody.innerHTML = '<div class="loading">Loading report data...</div>';

      try {
        const headers = { 'X-Admin-Key': API_KEY };
        const response = await fetch(`/api/admin/monitor/reports/${date}?limit=500`, { headers });
        const data = await response.json();

        if (!data.success || data.error) {
          modalBody.innerHTML = `<div class="error">${data.error || 'Failed to load report'}</div>`;
          return;
        }

        currentReportData = data;
        renderReportView(data);
      } catch (err) {
        modalBody.innerHTML = `<div class="error">Failed to load report: ${err.message}</div>`;
      }
    }

    function renderReportView(data) {
      const modalBody = document.getElementById('modalBody');
      const agg = data.aggregate || {};
      const timeline = data.timeline || [];

      modalBody.innerHTML = `
        <button class="back-btn" onclick="loadReportsList()">
          &larr; Back to list
        </button>

        <div class="tabs">
          <button class="tab active" onclick="switchTab('aggregate')">Aggregate</button>
          <button class="tab" onclick="switchTab('timeline')">Timeline (${timeline.length})</button>
        </div>

        <div id="tab-aggregate" class="tab-content active">
          ${renderAggregateView(agg)}
        </div>

        <div id="tab-timeline" class="tab-content">
          ${renderTimelineView(timeline)}
        </div>
      `;
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    function renderAggregateView(agg) {
      if (!agg || !agg.distributions) {
        return '<div class="no-data">No aggregate data available</div>';
      }

      const dist = agg.distributions || {};
      const metrics = agg.metrics || {};
      const trends = agg.trends || {};
      const timeRange = agg.timeRange || {};

      return `
        <div style="margin-bottom: 16px; padding: 8px 12px; background: var(--bg-tertiary); border-radius: 6px; font-size: 0.75rem; color: var(--text-secondary);">
          Time range: ${timeRange.start ? new Date(timeRange.start).toLocaleString() : '-'} to ${timeRange.end ? new Date(timeRange.end).toLocaleString() : '-'}
        </div>

        <div class="aggregate-section">
          <h3>Key Distribution</h3>
          <div class="distribution-grid">
            ${Object.entries(dist.keyCenter || {}).sort((a, b) => b[1] - a[1]).map(([k, v]) => `
              <div class="distribution-item">
                <div class="distribution-value">${k}</div>
                <div class="distribution-label">${v}%</div>
              </div>
            `).join('') || '<span class="no-data">No data</span>'}
          </div>
        </div>

        <div class="aggregate-section">
          <h3>Mode Distribution</h3>
          <div class="distribution-grid">
            ${Object.entries(dist.mode || {}).sort((a, b) => b[1] - a[1]).map(([k, v]) => `
              <div class="distribution-item">
                <div class="distribution-value">${k}</div>
                <div class="distribution-label">${v}%</div>
              </div>
            `).join('') || '<span class="no-data">No data</span>'}
          </div>
        </div>

        <div class="aggregate-section">
          <h3>Form Structure Distribution</h3>
          <div class="distribution-grid">
            ${Object.entries(dist.formStructure || {}).sort((a, b) => b[1] - a[1]).map(([k, v]) => `
              <div class="distribution-item">
                <div class="distribution-value">${k}</div>
                <div class="distribution-label">${v}%</div>
              </div>
            `).join('') || '<span class="no-data">No data</span>'}
          </div>
        </div>

        <div class="aggregate-section">
          <h3>Metrics Summary</h3>
          <div class="metrics-grid">
            ${renderMetricCard('Tempo (BPM)', metrics.tempo)}
            ${renderMetricCard('Energy', metrics.energy, true)}
            ${renderMetricCard('Complexity', metrics.complexity, true)}
            ${renderMetricCard('Density', metrics.density, true)}
          </div>
        </div>

        <div class="aggregate-section">
          <h3>Trends</h3>
          <div class="distribution-grid">
            ${Object.entries(trends).map(([k, v]) => `
              <div class="distribution-item">
                <div class="distribution-value">${getTrendIcon(v)}</div>
                <div class="distribution-label">${k}: ${v}</div>
              </div>
            `).join('') || '<span class="no-data">Insufficient data for trends</span>'}
          </div>
        </div>

        <div class="aggregate-section">
          <h3>Average Genre Weights</h3>
          <div class="genre-bars">
            ${Object.entries(dist.genreWeights || {}).sort((a, b) => b[1] - a[1]).map(([genre, weight]) => `
              <div class="genre-row">
                <span class="genre-name">${genre}</span>
                <div class="genre-bar">
                  <div class="genre-fill" style="width: ${(weight * 100).toFixed(0)}%"></div>
                </div>
                <span class="genre-value">${(weight * 100).toFixed(0)}%</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderMetricCard(label, data, isPercentage = false) {
      if (!data) return '';
      const format = (v) => isPercentage ? `${(v * 100).toFixed(0)}%` : v.toFixed(1);
      return `
        <div class="metric-card">
          <h4>${label}</h4>
          <div class="metric-values">
            <span>Min: ${format(data.min)}</span>
            <span>Avg: ${format(data.avg)}</span>
            <span>Max: ${format(data.max)}</span>
          </div>
        </div>
      `;
    }

    function getTrendIcon(trend) {
      if (trend === 'increasing') return '↗️';
      if (trend === 'decreasing') return '↘️';
      return '→';
    }

    function renderTimelineView(timeline) {
      if (!timeline || timeline.length === 0) {
        return '<div class="no-data">No timeline data available</div>';
      }

      return `
        <div class="timeline-wrapper">
          <table class="timeline-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Source</th>
                <th>Key</th>
                <th>Mode</th>
                <th>Form</th>
                <th>Section</th>
                <th>Tempo</th>
                <th>Energy</th>
                <th>Genre</th>
              </tr>
            </thead>
            <tbody>
              ${timeline.map(entry => `
                <tr>
                  <td>${new Date(entry.timestamp).toLocaleTimeString()}</td>
                  <td>${entry.source || '-'}</td>
                  <td>${entry.core?.keyCenter || '-'}</td>
                  <td>${entry.core?.mode || '-'}</td>
                  <td>${entry.core?.formStructure || '-'}</td>
                  <td>${entry.core?.currentSection || '-'}</td>
                  <td>${entry.core?.tempo || '-'}</td>
                  <td>${entry.style?.energy ? (entry.style.energy * 100).toFixed(0) + '%' : '-'}</td>
                  <td>${entry.style?.currentGenre || entry.style?.metricGenre || '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
  </script>
</body>
</html>
