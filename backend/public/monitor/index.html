<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webarmonium Composition Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-green: #3fb950;
      --accent-yellow: #d29922;
      --accent-red: #f85149;
      --border: #30363d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-red);
    }

    .status-dot.connected {
      background: var(--accent-green);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .param-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .param {
      background: var(--bg-tertiary);
      padding: 10px;
      border-radius: 6px;
    }

    .param-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .param-value {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
    }

    .param-value.small {
      font-size: 1rem;
    }

    .progress-bar {
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      margin-top: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .genre-bars {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .genre-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .genre-name {
      width: 80px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .genre-bar {
      flex: 1;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      overflow: hidden;
    }

    .genre-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .genre-value {
      width: 40px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: right;
    }

    .event-log {
      max-height: 300px;
      overflow-y: auto;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.75rem;
      background: var(--bg-tertiary);
      border-radius: 6px;
      padding: 12px;
    }

    .event-entry {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .event-entry:last-child {
      border-bottom: none;
    }

    .event-time {
      color: var(--text-secondary);
    }

    .event-type {
      color: var(--accent);
      margin: 0 8px;
    }

    .event-data {
      color: var(--text-primary);
    }

    .chart-container {
      height: 200px;
      position: relative;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .stat-value {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--accent-green);
    }

    .wide {
      grid-column: span 2;
    }

    @media (max-width: 768px) {
      .wide {
        grid-column: span 1;
      }
      .param-grid {
        grid-template-columns: 1fr;
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .error {
      color: var(--accent-red);
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Webarmonium Composition Monitor</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div id="app">
    <div class="loading">Loading monitor data...</div>
  </div>

  <script>
    // Configuration
    const API_KEY = new URLSearchParams(window.location.search).get('apiKey') || '';

    // State
    let socket = null;
    let tempoChart = null;
    let energyChart = null;
    let events = [];
    const MAX_EVENTS = 50;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      connectWebSocket();
      loadInitialData();
    });

    function connectWebSocket() {
      const wsUrl = window.location.origin;
      socket = io('/monitor', {
        query: { apiKey: API_KEY },
        transports: ['websocket']
      });

      socket.on('connect', () => {
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('statusText').textContent = 'Connected';
      });

      socket.on('disconnect', () => {
        document.getElementById('statusDot').classList.remove('connected');
        document.getElementById('statusText').textContent = 'Disconnected';
      });

      socket.on('connect_error', (err) => {
        document.getElementById('statusText').textContent = 'Connection Error';
        console.error('WebSocket error:', err);
      });

      socket.on('monitor:init', (data) => {
        renderDashboard(data);
      });

      socket.on('monitor:snapshot', (event) => {
        updateFromSnapshot(event.data);
        addEvent('SNAPSHOT', formatSnapshot(event.data));
      });

      socket.on('monitor:key_change', (data) => {
        addEvent('KEY', `${data.from} -> ${data.to}`);
      });

      socket.on('monitor:mode_change', (data) => {
        addEvent('MODE', `${data.from} -> ${data.to}`);
      });

      socket.on('monitor:form_change', (data) => {
        addEvent('FORM', `${data.from} -> ${data.to}`);
      });
    }

    async function loadInitialData() {
      try {
        const headers = { 'X-Admin-Key': API_KEY };
        const response = await fetch('/api/admin/monitor/realtime', { headers });
        const data = await response.json();

        if (data.success) {
          renderDashboard(data);
        } else {
          showError(data.message || 'Failed to load data');
        }
      } catch (err) {
        showError('Failed to connect to API');
        console.error(err);
      }
    }

    function renderDashboard(data) {
      const snapshot = data.currentSnapshot || {};
      const core = snapshot.core || {};
      const style = snapshot.style || {};
      const harmony = snapshot.harmony || {};
      const materials = snapshot.materials || {};
      const room = snapshot.room || {};

      const genreWeights = style.genreWeights || {};
      const rhythmic = style.rhythmicCharacter || {};
      const melodic = style.melodicCharacter || {};
      const harmonic = style.harmonicComplexity || {};

      document.getElementById('app').innerHTML = `
        <div class="grid">
          <!-- Core Parameters -->
          <div class="card">
            <div class="card-title">Core Composition</div>
            <div class="param-grid">
              <div class="param">
                <div class="param-label">Key Center</div>
                <div class="param-value" id="keyCenter">${core.keyCenter || 'C'}</div>
              </div>
              <div class="param">
                <div class="param-label">Mode</div>
                <div class="param-value small" id="mode">${core.mode || 'ionian'}</div>
              </div>
              <div class="param">
                <div class="param-label">Tempo</div>
                <div class="param-value" id="tempo">${core.tempo || 120} <small>BPM</small></div>
              </div>
              <div class="param">
                <div class="param-label">Form</div>
                <div class="param-value small" id="form">${core.formStructure || 'ABA'}</div>
              </div>
              <div class="param">
                <div class="param-label">Section</div>
                <div class="param-value small" id="section">${core.currentSection || 'A'}</div>
              </div>
              <div class="param">
                <div class="param-label">Composition #</div>
                <div class="param-value" id="compCount">${core.compositionCount || 0}</div>
              </div>
            </div>
          </div>

          <!-- Intensity Parameters -->
          <div class="card">
            <div class="card-title">Intensity</div>
            <div class="param-grid">
              <div class="param">
                <div class="param-label">Energy</div>
                <div class="param-value" id="energy">${((style.energy || 0.5) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" id="energyBar" style="width: ${(style.energy || 0.5) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Complexity</div>
                <div class="param-value" id="complexity">${((core.complexityLevel || 0.5) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" id="complexityBar" style="width: ${(core.complexityLevel || 0.5) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Density</div>
                <div class="param-value" id="density">${((core.density || 0.5) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" id="densityBar" style="width: ${(core.density || 0.5) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Tension</div>
                <div class="param-value" id="tension">${((core.tensionLevel || 0.5) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" id="tensionBar" style="width: ${(core.tensionLevel || 0.5) * 100}%"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Harmonic Analysis -->
          <div class="card">
            <div class="card-title">Harmonic Analysis</div>
            <div class="param-grid">
              <div class="param">
                <div class="param-label">Chromaticism</div>
                <div class="param-value" id="chromaticism">${((harmonic.chromaticism || 0) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${(harmonic.chromaticism || 0) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Dissonance</div>
                <div class="param-value" id="dissonance">${((harmonic.dissonance || 0) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${(harmonic.dissonance || 0) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Modal Flavor</div>
                <div class="param-value small" id="modalFlavor">${harmonic.modalFlavor || 'major'}</div>
              </div>
              <div class="param">
                <div class="param-label">Current Chord</div>
                <div class="param-value small" id="currentChord">${harmony.currentChord || '-'}</div>
              </div>
            </div>
          </div>

          <!-- Rhythmic Character -->
          <div class="card">
            <div class="card-title">Rhythmic Character</div>
            <div class="param-grid">
              <div class="param">
                <div class="param-label">Swing</div>
                <div class="param-value" id="swing">${((rhythmic.swing || 0) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${(rhythmic.swing || 0) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Syncopation</div>
                <div class="param-value" id="syncopation">${((rhythmic.syncopation || 0) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${(rhythmic.syncopation || 0) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Regularity</div>
                <div class="param-value" id="regularity">${((rhythmic.regularity || 0.5) * 100).toFixed(0)}%</div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${(rhythmic.regularity || 0.5) * 100}%"></div>
                </div>
              </div>
              <div class="param">
                <div class="param-label">Time Sig</div>
                <div class="param-value small" id="timeSig">${style.timeSignature || '4/4'}</div>
              </div>
            </div>
          </div>

          <!-- Genre Weights -->
          <div class="card">
            <div class="card-title">Genre Weights</div>
            <div class="genre-bars" id="genreWeights">
              ${renderGenreBars(genreWeights)}
            </div>
          </div>

          <!-- Statistics -->
          <div class="card">
            <div class="card-title">Session Statistics</div>
            <div class="stats-row">
              <div class="stat-item">
                <span class="stat-label">Compositions</span>
                <span class="stat-value" id="statCompositions">${data.eventCounts?.compositions || 0}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Key Changes</span>
                <span class="stat-value" id="statKeyChanges">${data.eventCounts?.keyChanges || 0}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Mode Changes</span>
                <span class="stat-value" id="statModeChanges">${data.eventCounts?.modeChanges || 0}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Form Changes</span>
                <span class="stat-value" id="statFormChanges">${data.eventCounts?.formChanges || 0}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Gestures</span>
                <span class="stat-value" id="statGestures">${room.gestureCount || 0}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Materials</span>
                <span class="stat-value" id="statMaterials">${materials.total || 0}</span>
              </div>
            </div>
          </div>

          <!-- Event Log -->
          <div class="card wide">
            <div class="card-title">Event Log</div>
            <div class="event-log" id="eventLog">
              ${events.map(e => renderEvent(e)).join('') || '<div class="event-entry"><span class="event-time">Waiting for events...</span></div>'}
            </div>
          </div>
        </div>
      `;
    }

    function renderGenreBars(weights) {
      const genres = ['ambient', 'rhythmic', 'melodic', 'experimental', 'jazz', 'classical', 'electronic', 'rock'];
      return genres.map(genre => `
        <div class="genre-row">
          <span class="genre-name">${genre}</span>
          <div class="genre-bar">
            <div class="genre-fill" style="width: ${((weights[genre] || 0) * 100)}%"></div>
          </div>
          <span class="genre-value">${((weights[genre] || 0) * 100).toFixed(0)}%</span>
        </div>
      `).join('');
    }

    function renderEvent(event) {
      return `
        <div class="event-entry">
          <span class="event-time">${event.time}</span>
          <span class="event-type">[${event.type}]</span>
          <span class="event-data">${event.data}</span>
        </div>
      `;
    }

    function updateFromSnapshot(snapshot) {
      const core = snapshot.core || {};
      const style = snapshot.style || {};
      const harmony = snapshot.harmony || {};
      const rhythmic = style.rhythmicCharacter || {};
      const harmonic = style.harmonicComplexity || {};
      const genreWeights = style.genreWeights || {};
      const room = snapshot.room || {};
      const materials = snapshot.materials || {};

      // Update core params
      updateElement('keyCenter', core.keyCenter || 'C');
      updateElement('mode', core.mode || 'ionian');
      updateElement('tempo', `${core.tempo || 120} <small>BPM</small>`);
      updateElement('form', core.formStructure || 'ABA');
      updateElement('section', core.currentSection || 'A');
      updateElement('compCount', core.compositionCount || 0);

      // Update intensity
      updateProgress('energy', style.energy || 0.5);
      updateProgress('complexity', core.complexityLevel || 0.5);
      updateProgress('density', core.density || 0.5);
      updateProgress('tension', core.tensionLevel || 0.5);

      // Update harmonic
      updateElement('chromaticism', `${((harmonic.chromaticism || 0) * 100).toFixed(0)}%`);
      updateElement('dissonance', `${((harmonic.dissonance || 0) * 100).toFixed(0)}%`);
      updateElement('modalFlavor', harmonic.modalFlavor || 'major');
      updateElement('currentChord', harmony.currentChord || '-');

      // Update rhythmic
      updateElement('swing', `${((rhythmic.swing || 0) * 100).toFixed(0)}%`);
      updateElement('syncopation', `${((rhythmic.syncopation || 0) * 100).toFixed(0)}%`);
      updateElement('regularity', `${((rhythmic.regularity || 0.5) * 100).toFixed(0)}%`);
      updateElement('timeSig', style.timeSignature || '4/4');

      // Update genre bars
      const genreBarsEl = document.getElementById('genreWeights');
      if (genreBarsEl) {
        genreBarsEl.innerHTML = renderGenreBars(genreWeights);
      }

      // Update stats
      updateElement('statGestures', room.gestureCount || 0);
      updateElement('statMaterials', materials.total || 0);
    }

    function updateElement(id, value) {
      const el = document.getElementById(id);
      if (el) {
        // Use textContent for safety (XSS prevention)
        // Only use innerHTML for trusted, pre-rendered HTML
        if (typeof value === 'string' && value.includes('<')) {
          // Sanitize HTML by escaping
          el.textContent = value.replace(/<[^>]*>/g, '');
        } else {
          el.textContent = value;
        }
      }
    }

    function updateProgress(id, value) {
      const valEl = document.getElementById(id);
      const barEl = document.getElementById(id + 'Bar');
      if (valEl) valEl.textContent = `${(value * 100).toFixed(0)}%`;
      if (barEl) barEl.style.width = `${value * 100}%`;
    }

    function addEvent(type, data) {
      const now = new Date();
      const time = now.toTimeString().slice(0, 8);

      events.unshift({ time, type, data });
      if (events.length > MAX_EVENTS) {
        events.pop();
      }

      const logEl = document.getElementById('eventLog');
      if (logEl) {
        logEl.innerHTML = events.map(e => renderEvent(e)).join('');
      }
    }

    function formatSnapshot(snapshot) {
      const core = snapshot.core || {};
      const source = snapshot.source || 'room';
      const roomId = snapshot.roomId || '-';
      const sourceLabel = source === 'landing' ? '🏠 LANDING' : `🚪 ${roomId.slice(0, 8)}`;
      return `[${sourceLabel}] ${core.keyCenter || 'C'} ${core.mode || 'ionian'} | ${core.formStructure || 'ABA'} [${core.currentSection || 'A'}] | ${core.tempo || 120} BPM`;
    }

    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="error">${message}</div>
      `;
    }
  </script>
</body>
</html>
