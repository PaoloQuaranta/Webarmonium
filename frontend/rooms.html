<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Webarmonium - Collaborative Generative Music</title>
    <meta name="description" content="Real-time collaborative platform for gesture-controlled generative music">

    <!-- Entry #115: Frontend domain protection - MUST be first script -->
    <script>
    (function() {
      var ALLOWED = ['localhost','127.0.0.1','webarmonium.com','www.webarmonium.com','webarmonium.net','www.webarmonium.net'];
      var host = window.location.hostname.toLowerCase();
      var isAllowed = ALLOWED.some(function(d) { return host === d || host.endsWith('.' + d); });

      if (!isAllowed) {
        window.WEBARMONIUM_BLOCKED = true;
        document.addEventListener('DOMContentLoaded', function() {
          // Create blocking overlay
          var overlay = document.createElement('div');
          overlay.id = 'unauthorized-domain-overlay';
          overlay.innerHTML = [
            '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-family:system-ui,sans-serif;">',
            '<div style="background:#dc2626;color:white;padding:15px 30px;border-radius:8px;font-size:18px;font-weight:bold;margin-bottom:30px;">',
            'UNAUTHORIZED MIRROR SITE',
            '</div>',
            '<div style="color:#fff;font-size:24px;margin-bottom:20px;">',
            'This is not the official Webarmonium website.',
            '</div>',
            '<div style="color:#ccc;font-size:16px;margin-bottom:30px;max-width:500px;">',
            'You are viewing an unauthorized copy. The official site is:',
            '</div>',
            '<a href="https://webarmonium.net" style="background:#22c55e;color:white;padding:15px 40px;border-radius:8px;font-size:20px;font-weight:bold;text-decoration:none;">',
            'Go to webarmonium.net',
            '</a>',
            '<div style="color:#888;font-size:12px;margin-top:40px;">',
            'This mirror site has been reported for copyright infringement.',
            '</div>',
            '</div>'
          ].join('');
          document.body.innerHTML = '';
          document.body.appendChild(overlay);
        });
      }
    })();
    </script>

    <!-- Google Fonts - Archivo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Preload critical resources -->
    <link rel="preload" href="https://unpkg.com/tone@14.7.77/build/Tone.js" as="script">
    <link rel="preload" href="https://cdn.socket.io/4.7.5/socket.io.min.js" as="script">

    <!-- Performance and SEO -->
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <style>
        /* Critical CSS for immediate rendering */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Global visited link reset - maintain original colors */
        a:visited {
            color: inherit;
        }

        body {
            font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Loading spinner */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Hidden until app loads */
        .app-content {
            display: none;
        }

        .app-content.loaded {
            display: block;
        }

        #gestureCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
            z-index: 5; /* CRITICAL: Above p5 canvas (z-index: 0) to receive mouse/touch events */
        }

        .room-interface {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            z-index: 1000;
            /* Entry #52: Collapsible UI */
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .room-interface.collapsed {
            transform: translateY(calc(-100% - 30px));
            opacity: 0;
            pointer-events: none;
        }

        .room-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        /* Left section: settings button */
        .room-left {
            display: flex;
            align-items: center;
            flex: 0 0 auto;
        }

        /* Center section: audio controls */
        .room-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            flex: 1;
        }

        /* Right section: logo and user count */
        .room-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 0 0 auto;
        }

        .room-logo-link {
            display: flex;
            align-items: center;
            flex: 0 0 auto;
        }

        .room-logo {
            height: 32px;
            width: auto;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .room-logo:hover {
            opacity: 1;
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 0 0 auto;
        }

        .audio-controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex: 0 0 auto;
        }

        .user-count {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .room-id {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #a5b4fc;
            opacity: 0.8;
        }

        .audio-toggle {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .audio-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .audio-toggle.disabled {
            background: #666;
            color: #ccc;
            transform: none;
            box-shadow: none;
        }

        .audio-toggle.playing {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .audio-toggle.playing:hover {
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .back-link {
            background: rgba(255, 255, 255, 0.1);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-link:hover {
            background: rgba(99, 102, 241, 0.2);
            color: white;
        }

        /* Desktop settings button - icon only */
        .desktop-settings-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .desktop-settings-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: white;
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 25px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            /* Entry #52: Collapsible UI */
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .instructions.collapsed {
            transform: translateX(-50%) translateY(calc(100% + 30px));
            opacity: 0;
            pointer-events: none;
        }

        /* Entry #52: Mobile hidden class */
        .mobile-hidden {
            display: none !important;
        }

        /* Entry #52: Mobile menu button */
        .mobile-menu-btn {
            display: none;
        }

        /* Entry #52: Mobile bottom sheet */
        .mobile-menu-backdrop {
            display: none;
        }

        .mobile-bottom-sheet {
            display: none;
        }

        /* Entry #48: Mobile optimizations */
        @media (max-width: 768px) {
            .room-logo {
                height: 28px;
            }

            .room-interface {
                top: max(10px, env(safe-area-inset-top, 10px));
                left: max(10px, env(safe-area-inset-left, 10px));
                right: max(10px, env(safe-area-inset-right, 10px));
                padding: 0.5rem 1rem;
            }

            .room-status {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .room-center {
                display: none;
            }

            .instructions {
                bottom: max(10px, calc(env(safe-area-inset-bottom, 10px) + 50px));
                font-size: 11px;
                padding: 10px 15px;
            }

            /* Larger touch targets */
            button, .audio-toggle, .primary-btn {
                min-height: 48px;
                min-width: 48px;
                padding: 12px 20px;
                font-size: 16px;
            }

            /* Audio controls layout for mobile */
            .audio-controls {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .audio-controls button {
                width: 100%;
            }

            /* Volume slider - larger touch area */
            input[type="range"] {
                height: 24px;
                -webkit-appearance: none;
            }

            /* Prevent pull-to-refresh and overscroll */
            body {
                overscroll-behavior: none;
            }

            /* Prevent text selection during gestures */
            canvas, #p5-container {
                -webkit-user-select: none;
                user-select: none;
                -webkit-touch-callout: none;
            }

            /* Entry #52: Mobile menu button */
            .mobile-menu-btn {
                display: flex;
                position: fixed;
                top: max(12px, env(safe-area-inset-top, 12px));
                right: max(12px, env(safe-area-inset-right, 12px));
                z-index: 1002;
                background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
                border: none;
                color: white;
                border-radius: 50%;
                width: 52px;
                height: 52px;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                font-size: 24px;
                font-weight: bold;
                box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
                transition: transform 0.2s, background 0.2s;
            }

            .mobile-menu-btn:active {
                transform: scale(0.95);
            }

            .mobile-menu-btn.open {
                background: rgba(255, 100, 100, 0.9);
            }

            /* Entry #52: Mobile backdrop */
            .mobile-menu-backdrop {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1003;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }

            .mobile-menu-backdrop.open {
                opacity: 1;
                pointer-events: auto;
            }

            /* Entry #52: Mobile bottom sheet */
            .mobile-bottom-sheet {
                display: block;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(26, 26, 46, 0.98);
                backdrop-filter: blur(20px);
                border-radius: 20px 20px 0 0;
                z-index: 1004;
                transform: translateY(100%);
                transition: transform 0.3s ease;
                max-height: 80vh;
                overflow-y: auto;
                padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
            }

            .mobile-bottom-sheet.open {
                transform: translateY(0);
            }

            .mobile-sheet-handle {
                width: 40px;
                height: 4px;
                background: rgba(255, 255, 255, 0.3);
                border-radius: 2px;
                margin: 12px auto;
            }

            .mobile-sheet-content {
                padding: 0 20px 20px;
            }

            .mobile-sheet-section {
                padding: 12px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .mobile-sheet-section:last-child {
                border-bottom: none;
            }

            .mobile-sheet-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
            }

            .mobile-user-count {
                background: rgba(99, 102, 241, 0.2);
                color: #a5b4fc;
                padding: 6px 14px;
                border-radius: 20px;
                font-size: 14px;
                font-weight: 500;
            }

            .mobile-room-id {
                font-family: 'Courier New', monospace;
                font-size: 12px;
                color: #a5b4fc;
                opacity: 0.8;
            }

            .mobile-back-link {
                display: block;
                color: #a5b4fc;
                text-decoration: none;
                font-size: 14px;
                padding: 8px 0;
            }

            .mobile-instructions {
                font-size: 13px;
                color: #aaa;
                line-height: 1.6;
            }

            .mobile-instructions div {
                margin-bottom: 6px;
            }

            .mobile-close-btn {
                width: 100%;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                padding: 14px;
                border-radius: 10px;
                font-size: 16px;
                margin-top: 10px;
                cursor: pointer;
            }

            .mobile-close-btn:active {
                background: rgba(255, 255, 255, 0.2);
            }

            /* Mobile audio controls styling */
            #mobileAudioControls {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            #mobileAudioControls button {
                width: 100%;
                min-height: 48px;
            }

            /* Entry #74: Mobile Settings button */
            .mobile-settings-btn {
                background: rgba(99, 102, 241, 0.15);
                border: 1px solid rgba(99, 102, 241, 0.3);
                color: #a5b4fc;
                border-radius: 8px;
                font-size: 14px;
                transition: background 0.2s, border-color 0.2s, color 0.2s;
            }

            .mobile-settings-btn:hover {
                background: rgba(99, 102, 241, 0.25);
                border-color: rgba(99, 102, 241, 0.5);
            }

            .mobile-settings-btn:active {
                background: rgba(99, 102, 241, 0.35);
            }

            /* Mobile volume slider */
            .mobile-volume-control {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 8px 0;
            }

            .mobile-volume-label {
                color: #aaa;
                font-size: 14px;
                min-width: 60px;
            }

            .mobile-volume-slider {
                flex: 1;
                height: 6px;
                -webkit-appearance: none;
                appearance: none;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 3px;
                outline: none;
            }

            .mobile-volume-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 24px;
                height: 24px;
                background: #8b5cf6;
                border-radius: 50%;
                cursor: pointer;
            }

            .mobile-volume-slider::-moz-range-thumb {
                width: 24px;
                height: 24px;
                background: #8b5cf6;
                border-radius: 50%;
                cursor: pointer;
                border: none;
            }

            /* Mobile room info overlay (top-left corner) */
            .mobile-overlay-user-count {
                color: #a5b4fc;
                font-size: 13px;
                font-weight: 500;
            }

            .mobile-overlay-room-id {
                font-family: 'Courier New', monospace;
                font-size: 11px;
                color: #888;
            }
        }

        /* Accelerometer calibration button (mobile only) */
        .accelerometer-calibrate {
            display: none;
        }

        @media (max-width: 768px) {
            .accelerometer-calibrate {
                display: inline-block;
                background: rgba(99, 102, 241, 0.2);
                border: 1px solid rgba(99, 102, 241, 0.4);
                color: white;
                padding: 8px 12px;
                border-radius: 4px;
                font-size: 12px;
                cursor: pointer;
            }

            .accelerometer-calibrate.active {
                background: rgba(99, 102, 241, 0.4);
            }
        }

        /* Error display */
        .error-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff4444;
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            text-align: center;
            z-index: 2000;
        }

        .error-title {
            color: #ff4444;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .error-message {
            color: #ccc;
            font-size: 14px;
            line-height: 1.4;
        }

        /* Entry #73: Audio mode indicator - bottom-left overlay */
        .audio-mode-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 193, 7, 0.2);
            backdrop-filter: blur(10px);
            color: #ffc107;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
            transition: opacity 0.3s ease, background 0.3s ease, transform 0.3s ease;
        }

        .audio-mode-indicator.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        .audio-mode-indicator.low-power {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .audio-mode-indicator.degraded {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .audio-mode-indicator.minimal {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }

        .audio-mode-indicator.emergency {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            animation: pulse-warning 1.5s ease-in-out infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Loading state -->
        <div class="loading" id="loadingScreen">
            <div class="spinner"></div>
            <div>Loading Webarmonium...</div>
            <div style="font-size: 12px; margin-top: 10px; color: #666;">
                Initializing audio engine and connecting to collaborative space
            </div>
        </div>

        <!-- Main application content -->
        <div class="app-content" id="appContent">
            <!-- Room interface -->
            <div class="room-interface">
                <div class="room-status">
                    <!-- Left: Logo and user count -->
                    <div class="room-left">
                        <a href="/" class="room-logo-link" title="Webarmonium Home">
                            <img src="/webarmonium-logo.svg" alt="Webarmonium" class="room-logo">
                        </a>
                        <div class="user-count" id="userCount">1 user</div>
                    </div>

                    <!-- Center: Audio controls -->
                    <div class="room-center">
                        <button class="audio-toggle" id="audioToggle">▶</button>
                        <div id="audio-controls"></div>
                    </div>

                    <!-- Right: Settings button (added by UIManager) -->
                    <div class="room-right" id="roomRight"></div>
                </div>
            </div>

            <!-- Hidden room ID for internal tracking -->
            <div id="roomId" style="display: none;">Room: connecting...</div>

            <!-- p5.js generative graphics background -->
            <div id="p5-container"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;">
            </div>

            <!-- Main gesture canvas -->
            <canvas id="gestureCanvas"></canvas>

            <!-- Cursor overlay canvas DISABLED - cursors now rendered in p5.js SpringMeshNetwork -->
            <canvas id="cursorOverlay"
                style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;"></canvas>

            <!-- Instructions -->
            <div class="instructions">
                <div><strong>Tap</strong> for notes (hold longer for sustained tones)</div>
                <div style="margin-top: 4px;"><strong>Drag</strong> to create melodic phrases</div>
            </div>
        </div>

        <!-- Error display (hidden by default) -->
        <div class="error-display" id="errorDisplay" style="display: none;">
            <div class="error-title">Connection Error</div>
            <div class="error-message" id="errorMessage">
                Unable to connect to the Webarmonium server. Please check that the backend is running.
            </div>
        </div>
    </div>

    <!-- External dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>

    <!-- Phase 3: Constants (load first) -->
    <script src="src/constants/MusicalConstants.js?v=1"></script>
    <script src="src/constants/GestureConstants.js?v=1"></script>

    <!-- Utilities -->
    <script src="src/utils/ErrorReporter.js?v=5"></script>
    <script src="src/utils/MusicalScales.js?v=1"></script>
    <script src="src/utils/VelocityCalculator.js?v=1"></script>

    <!-- Performance optimization: Unified update loop -->
    <script src="src/services/UnifiedUpdateLoop.js?v=1"></script>

    <!-- Entry #46: Shared platform detection utility -->
    <script src="src/utils/PlatformDetection.js?v=4"></script>

    <!-- Entry #73: Device capability detection -->
    <script src="src/utils/DeviceCapabilities.js?v=2"></script> <!-- Entry #73 FIX: Tier threshold scoring -->

    <!-- Entry #48: Mobile support services -->
    <script src="src/services/MobileResourceManager.js?v=1"></script>

    <!-- Application services -->
    <!-- <script src="src/services/GestureCapture.js?v=5"></script> -->
    <!-- DISABLED - using EnhancedGestureCapture instead -->
    <script src="src/services/SocketService.js?v=12"></script> <!-- Fix: Add virtual:phrase-visual handler -->
